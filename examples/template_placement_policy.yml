---
- name: Template Placement Policy playbook
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/nutanix.ncp.ntnx:
      nutanix_host: "{{ ip }}"
      nutanix_username: "{{ username }}"
      nutanix_password: "{{ password }}"
      validate_certs: false
  vars:
    ip: "10.101.64.132"
    username: "admin"
    password: "Nutanix.123"
  tasks:
    - name: List all categories to find usable category ext_ids
      nutanix.ncp.ntnx_categories_info_v2:
      register: categories_result

    - name: Set category ext_ids from available categories
      ansible.builtin.set_fact:
        content_category_ext_id: "{{ categories_result.response[0].ext_id }}"
        cluster_category_ext_id: >-
          {{ categories_result.response[1].ext_id
          if categories_result.response | length > 1
          else categories_result.response[0].ext_id }}

    - name: Create a template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        name: "ansible-test-template-placement-policy"
        description: "Template placement policy created by Ansible"
        placement_type: "SOFT"
        content_filter:
          type: "CATEGORIES_MATCH_ALL"
          category_ext_ids:
            - "{{ content_category_ext_id }}"
        cluster_filter:
          type: "CATEGORIES_MATCH_ANY"
          category_ext_ids:
            - "{{ cluster_category_ext_id }}"
        state: present
        wait: true
      register: create_result

    - name: Print create result
      ansible.builtin.debug:
        var: create_result

    - name: Get template placement policy by ext_id
      nutanix.ncp.ntnx_template_placement_policies_info_v2:
        ext_id: "{{ create_result.ext_id }}"
      register: get_result

    - name: Print get result
      ansible.builtin.debug:
        var: get_result

    - name: List all template placement policies
      nutanix.ncp.ntnx_template_placement_policies_info_v2:
      register: list_result

    - name: Print list result
      ansible.builtin.debug:
        var: list_result

    - name: Update the template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "{{ create_result.ext_id }}"
        name: "ansible-test-template-placement-policy-updated"
        description: "Updated template placement policy"
        state: present
        wait: true
      register: update_result

    - name: Print update result
      ansible.builtin.debug:
        var: update_result

    - name: Delete the template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "{{ create_result.ext_id }}"
        state: absent
        wait: true
      register: delete_result

    - name: Print delete result
      ansible.builtin.debug:
        var: delete_result
