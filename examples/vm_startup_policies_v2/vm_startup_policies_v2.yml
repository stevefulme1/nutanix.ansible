---
# Summary:
# This playbook will do:
# 1. List all categories and pick two for testing
# 2. Create a VM startup policy with groups and start conditions
# 3. Get the VM startup policy by ID
# 4. List all VM startup policies
# 5. Update the VM startup policy (change name, description)
# 6. Get the updated VM startup policy by ID
# 7. Delete the VM startup policy


- name: VM startup policies crud playbook
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/nutanix.ncp.ntnx:
      nutanix_host: 10.97.192.208
      nutanix_username: admin
      nutanix_password: Nutanix.123
      validate_certs: false
  tasks:
    - name: Generate random name
      ansible.builtin.set_fact:
        random_name: "{{ query('community.general.random_string', numbers=false, special=false, length=12)[0] }}"

    - name: Set variables
      ansible.builtin.set_fact:
        policy_name: "{{ random_name }}_startup_policy"
        policy_name_updated: "{{ random_name }}_startup_policy_updated"

    - name: List all categories and pick first two
      nutanix.ncp.ntnx_categories_info_v2:
      register: categories_result
      ignore_errors: true

    - name: Assert categories listed
      ansible.builtin.assert:
        that:
          - categories_result.response is defined
          - categories_result.response | length > 1
        fail_msg: "Unable to list categories"
        success_msg: "Categories listed successfully"

    - name: Set category ext_ids
      ansible.builtin.set_fact:
        category_ext_id_1: '{{ categories_result["response"][0]["ext_id"] }}'
        category_ext_id_2: '{{ categories_result["response"][1]["ext_id"] }}'

    ########################################################################
    # Create
    ########################################################################

    - name: Create a VM startup policy
      nutanix.ncp.ntnx_vm_startup_policy_v2:
        state: present
        name: "{{ policy_name }}"
        description: "Test VM startup policy for example run"
        groups:
          - categories:
              - ext_id: "{{ category_ext_id_1 }}"
          - categories:
              - ext_id: "{{ category_ext_id_2 }}"
        start_conditions:
          - power_state_criteria:
              criteria_type: GUEST_BOOTUP
              timeout_duration_secs: 300
            delay_duration_secs: 60
        wait: true
      register: create_result
      ignore_errors: true

    - name: Print create result
      ansible.builtin.debug:
        var: create_result

    - name: Assert create succeeded
      ansible.builtin.assert:
        that:
          - create_result.changed == true
          - create_result.failed == false
          - create_result.response is defined
          - create_result.ext_id is defined
        fail_msg: "Create VM startup policy failed"
        success_msg: "VM startup policy created successfully"

    - name: Set created policy ext_id
      ansible.builtin.set_fact:
        policy_ext_id: "{{ create_result.ext_id }}"

    ########################################################################
    # Get by ID
    ########################################################################

    - name: Get VM startup policy by ID
      nutanix.ncp.ntnx_vm_startup_policies_info_v2:
        ext_id: "{{ policy_ext_id }}"
      register: get_result
      ignore_errors: true

    - name: Print get result
      ansible.builtin.debug:
        var: get_result

    - name: Assert get succeeded
      ansible.builtin.assert:
        that:
          - get_result.failed == false
          - get_result.response is defined
          - get_result.response.name == policy_name
        fail_msg: "Get VM startup policy by ID failed"
        success_msg: "VM startup policy fetched successfully"

    ########################################################################
    # List
    ########################################################################

    - name: List all VM startup policies
      nutanix.ncp.ntnx_vm_startup_policies_info_v2:
      register: list_result
      ignore_errors: true

    - name: Print list result
      ansible.builtin.debug:
        var: list_result

    - name: Assert list succeeded
      ansible.builtin.assert:
        that:
          - list_result.failed == false
          - list_result.response is defined
        fail_msg: "List VM startup policies failed"
        success_msg: "VM startup policies listed successfully"

    ########################################################################
    # Update
    ########################################################################

    - name: Update the VM startup policy
      nutanix.ncp.ntnx_vm_startup_policy_v2:
        state: present
        ext_id: "{{ policy_ext_id }}"
        name: "{{ policy_name_updated }}"
        description: "Updated VM startup policy for example run"
        wait: true
      register: update_result
      ignore_errors: true

    - name: Print update result
      ansible.builtin.debug:
        var: update_result

    - name: Assert update succeeded
      ansible.builtin.assert:
        that:
          - update_result.changed == true
          - update_result.failed == false
          - update_result.response is defined
          - update_result.response.name == policy_name_updated
        fail_msg: "Update VM startup policy failed"
        success_msg: "VM startup policy updated successfully"

    ########################################################################
    # Get updated by ID
    ########################################################################

    - name: Get updated VM startup policy by ID
      nutanix.ncp.ntnx_vm_startup_policies_info_v2:
        ext_id: "{{ policy_ext_id }}"
      register: get_updated_result
      ignore_errors: true

    - name: Assert get updated succeeded
      ansible.builtin.assert:
        that:
          - get_updated_result.failed == false
          - get_updated_result.response.name == policy_name_updated
        fail_msg: "Get updated VM startup policy failed"
        success_msg: "Updated VM startup policy fetched successfully"

    ########################################################################
    # Delete
    ########################################################################

    - name: Delete the VM startup policy
      nutanix.ncp.ntnx_vm_startup_policy_v2:
        state: absent
        ext_id: "{{ policy_ext_id }}"
        wait: true
      register: delete_result
      ignore_errors: true

    - name: Print delete result
      ansible.builtin.debug:
        var: delete_result

    - name: Assert delete succeeded
      ansible.builtin.assert:
        that:
          - delete_result.changed == true
          - delete_result.failed == false
        fail_msg: "Delete VM startup policy failed"
        success_msg: "VM startup policy deleted successfully"
