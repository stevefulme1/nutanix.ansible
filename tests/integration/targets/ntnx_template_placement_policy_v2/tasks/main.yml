---
- name: Template Placement Policy CRUD tests
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/nutanix.ncp.ntnx:
      nutanix_host: "{{ ip }}"
      nutanix_username: "{{ username }}"
      nutanix_password: "{{ password }}"
      validate_certs: false
  tasks:
    - name: List all categories to get usable category ext_ids
      nutanix.ncp.ntnx_categories_info_v2:
      register: categories_result

    - name: Set category ext_ids
      ansible.builtin.set_fact:
        content_category_ext_id: "{{ categories_result.response[0].ext_id }}"
        cluster_category_ext_id: >-
          {{ categories_result.response[1].ext_id
          if categories_result.response | length > 1
          else categories_result.response[0].ext_id }}

    # ===================== CREATE TESTS =====================

    - name: Create template placement policy - check mode
      nutanix.ncp.ntnx_template_placement_policy_v2:
        name: "test-tpp-ansible-integration"
        description: "Integration test policy"
        placement_type: "SOFT"
        content_filter:
          type: "CATEGORIES_MATCH_ALL"
          category_ext_ids:
            - "{{ content_category_ext_id }}"
        cluster_filter:
          type: "CATEGORIES_MATCH_ANY"
          category_ext_ids:
            - "{{ cluster_category_ext_id }}"
        state: present
        wait: true
      check_mode: true
      register: create_check_mode_result

    - name: Assert create check mode
      ansible.builtin.assert:
        that:
          - create_check_mode_result.changed == false
          - create_check_mode_result.failed == false
          - create_check_mode_result.response is not none
          - create_check_mode_result.response.name == "test-tpp-ansible-integration"

    - name: Create template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        name: "test-tpp-ansible-integration"
        description: "Integration test policy"
        placement_type: "SOFT"
        content_filter:
          type: "CATEGORIES_MATCH_ALL"
          category_ext_ids:
            - "{{ content_category_ext_id }}"
        cluster_filter:
          type: "CATEGORIES_MATCH_ANY"
          category_ext_ids:
            - "{{ cluster_category_ext_id }}"
        state: present
        wait: true
      register: create_result

    - name: Assert create result
      ansible.builtin.assert:
        that:
          - create_result.changed == true
          - create_result.failed == false
          - create_result.ext_id is not none
          - create_result.response.name == "test-tpp-ansible-integration"
          - create_result.response.description == "Integration test policy"
          - create_result.response.placement_type == "SOFT"

    - name: Set policy ext_id
      ansible.builtin.set_fact:
        policy_ext_id: "{{ create_result.ext_id }}"

    # ===================== INFO TESTS =====================

    - name: Get template placement policy by ext_id
      nutanix.ncp.ntnx_template_placement_policies_info_v2:
        ext_id: "{{ policy_ext_id }}"
      register: get_result

    - name: Assert get result
      ansible.builtin.assert:
        that:
          - get_result.changed == false
          - get_result.failed == false
          - get_result.ext_id == policy_ext_id
          - get_result.response.name == "test-tpp-ansible-integration"

    - name: List all template placement policies
      nutanix.ncp.ntnx_template_placement_policies_info_v2:
      register: list_result

    - name: Assert list result
      ansible.builtin.assert:
        that:
          - list_result.changed == false
          - list_result.failed == false
          - list_result.response | length >= 1
          - list_result.total_available_results >= 1

    # ===================== UPDATE TESTS =====================

    - name: Update template placement policy - check mode
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        name: "test-tpp-ansible-integration-updated"
        description: "Updated integration test policy"
        state: present
        wait: true
      check_mode: true
      register: update_check_mode_result

    - name: Assert update check mode
      ansible.builtin.assert:
        that:
          - update_check_mode_result.changed == false
          - update_check_mode_result.failed == false
          - update_check_mode_result.response is not none
          - update_check_mode_result.response.name == "test-tpp-ansible-integration-updated"

    - name: Update template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        name: "test-tpp-ansible-integration-updated"
        description: "Updated integration test policy"
        state: present
        wait: true
      register: update_result

    - name: Assert update result
      ansible.builtin.assert:
        that:
          - update_result.changed == true
          - update_result.failed == false
          - update_result.ext_id == policy_ext_id
          - update_result.response.name == "test-tpp-ansible-integration-updated"
          - update_result.response.description == "Updated integration test policy"

    - name: Update template placement policy - idempotency test
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        name: "test-tpp-ansible-integration-updated"
        description: "Updated integration test policy"
        state: present
        wait: true
      register: idempotent_result

    - name: Assert idempotency
      ansible.builtin.assert:
        that:
          - idempotent_result.changed == false
          - idempotent_result.failed == false
          - idempotent_result.skipped == true

    # ===================== DELETE TESTS =====================

    - name: Delete template placement policy - check mode
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        state: absent
        wait: true
      check_mode: true
      register: delete_check_mode_result

    - name: Assert delete check mode
      ansible.builtin.assert:
        that:
          - delete_check_mode_result.changed == false
          - delete_check_mode_result.failed == false
          - delete_check_mode_result.msg is defined

    - name: Delete template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        state: absent
        wait: true
      register: delete_result

    - name: Assert delete result
      ansible.builtin.assert:
        that:
          - delete_result.changed == true
          - delete_result.failed == false
          - delete_result.ext_id == policy_ext_id

    # ===================== NEGATIVE TESTS =====================

    - name: Get non-existent template placement policy
      nutanix.ncp.ntnx_template_placement_policies_info_v2:
        ext_id: "00000000-0000-0000-0000-000000000000"
      register: negative_get_result
      ignore_errors: true

    - name: Assert negative get result
      ansible.builtin.assert:
        that:
          - negative_get_result.failed == true
          - negative_get_result.msg is defined

    - name: Delete non-existent template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "00000000-0000-0000-0000-000000000000"
        state: absent
        wait: true
      register: negative_delete_result
      ignore_errors: true

    - name: Assert negative delete result
      ansible.builtin.assert:
        that:
          - negative_delete_result.failed == true
          - negative_delete_result.msg is defined

    - name: Update non-existent template placement policy
      nutanix.ncp.ntnx_template_placement_policy_v2:
        ext_id: "00000000-0000-0000-0000-000000000000"
        name: "non-existent-policy"
        state: present
        wait: true
      register: negative_update_result
      ignore_errors: true

    - name: Assert negative update result
      ansible.builtin.assert:
        that:
          - negative_update_result.failed == true
          - negative_update_result.msg is defined
