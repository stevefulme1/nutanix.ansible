---
- name: Start testing ntnx_vm_startup_policy_v2 and ntnx_vm_startup_policies_info_v2
  ansible.builtin.debug:
    msg: Start testing VM startup policy modules

- name: Generate random name
  ansible.builtin.set_fact:
    random_name: "{{ query('community.general.random_string', numbers=false, special=false, length=12)[0] }}"

- name: Set policy names
  ansible.builtin.set_fact:
    policy_name: "{{ random_name }}_startup_policy"
    policy_name_updated: "{{ random_name }}_startup_policy_updated"

- name: List all categories and choose first two
  nutanix.ncp.ntnx_categories_info_v2:
  register: result
  ignore_errors: true

- name: Assert categories listed
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length > 1
    fail_msg: "Unable to list categories"
    success_msg: "Categories listed successfully"

- name: Set variables
  ansible.builtin.set_fact:
    category_ext_id_1: '{{ result["response"][0]["ext_id"] }}'
    category_ext_id_2: '{{ result["response"][1]["ext_id"] }}'

- name: Set todelete list
  ansible.builtin.set_fact:
    todelete: []

##################################################################################
# Create - check mode
##################################################################################

- name: Create a VM startup policy - check mode
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: present
    name: "{{ policy_name }}"
    description: "Test VM startup policy"
    groups:
      - categories:
          - ext_id: "{{ category_ext_id_1 }}"
      - categories:
          - ext_id: "{{ category_ext_id_2 }}"
    start_conditions:
      - power_state_criteria:
          criteria_type: GUEST_BOOTUP
          timeout_duration_secs: 300
        delay_duration_secs: 60
    wait: true
  register: result
  ignore_errors: true
  check_mode: true

- name: Create check mode - assert
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.name == policy_name
      - result.response.description == "Test VM startup policy"
    fail_msg: "Create VM startup policy check mode failed"
    success_msg: "Create VM startup policy check mode passed"

##################################################################################
# Create
##################################################################################

- name: Create a VM startup policy
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: present
    name: "{{ policy_name }}"
    description: "Test VM startup policy"
    groups:
      - categories:
          - ext_id: "{{ category_ext_id_1 }}"
      - categories:
          - ext_id: "{{ category_ext_id_2 }}"
    start_conditions:
      - power_state_criteria:
          criteria_type: GUEST_BOOTUP
          timeout_duration_secs: 300
        delay_duration_secs: 60
    wait: true
  register: result
  ignore_errors: true

- name: Create - assert
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
      - result.response is defined
      - result.ext_id is defined
      - result.response.name == policy_name
    fail_msg: "Create VM startup policy failed"
    success_msg: "Create VM startup policy passed"

- name: Set created policy ext_id
  ansible.builtin.set_fact:
    policy_ext_id: "{{ result.ext_id }}"
    todelete: "{{ todelete + [result.ext_id] }}"

##################################################################################
# Idempotency - update with same values should skip
##################################################################################

- name: Update VM startup policy with same values (idempotency)
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: present
    ext_id: "{{ policy_ext_id }}"
    name: "{{ policy_name }}"
    description: "Test VM startup policy"
    groups:
      - categories:
          - ext_id: "{{ category_ext_id_1 }}"
      - categories:
          - ext_id: "{{ category_ext_id_2 }}"
    start_conditions:
      - power_state_criteria:
          criteria_type: GUEST_BOOTUP
          timeout_duration_secs: 300
        delay_duration_secs: 60
    wait: true
  register: result
  ignore_errors: true

- name: Idempotency - assert
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.skipped == true
      - result.msg == "Nothing to change."
    fail_msg: "Idempotency check failed"
    success_msg: "Idempotency check passed"

##################################################################################
# Get by ID
##################################################################################

- name: Get VM startup policy by ID
  nutanix.ncp.ntnx_vm_startup_policies_info_v2:
    ext_id: "{{ policy_ext_id }}"
  register: result
  ignore_errors: true

- name: Get by ID - assert
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == false
      - result.response is defined
      - result.response.name == policy_name
      - result.ext_id == policy_ext_id
    fail_msg: "Get VM startup policy by ID failed"
    success_msg: "Get VM startup policy by ID passed"

##################################################################################
# List
##################################################################################

- name: List all VM startup policies
  nutanix.ncp.ntnx_vm_startup_policies_info_v2:
  register: result
  ignore_errors: true

- name: List - assert
  ansible.builtin.assert:
    that:
      - result.failed == false
      - result.changed == false
      - result.response is defined
      - result.response | length > 0
    fail_msg: "List VM startup policies failed"
    success_msg: "List VM startup policies passed"

##################################################################################
# Update - check mode
##################################################################################

- name: Update VM startup policy - check mode
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: present
    ext_id: "{{ policy_ext_id }}"
    name: "{{ policy_name_updated }}"
    description: "Updated VM startup policy"
    wait: true
  register: result
  ignore_errors: true
  check_mode: true

- name: Update check mode - assert
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.name == policy_name_updated
    fail_msg: "Update VM startup policy check mode failed"
    success_msg: "Update VM startup policy check mode passed"

##################################################################################
# Update
##################################################################################

- name: Update VM startup policy
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: present
    ext_id: "{{ policy_ext_id }}"
    name: "{{ policy_name_updated }}"
    description: "Updated VM startup policy"
    wait: true
  register: result
  ignore_errors: true

- name: Update - assert
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
      - result.response is defined
      - result.response.name == policy_name_updated
      - result.response.description == "Updated VM startup policy"
    fail_msg: "Update VM startup policy failed"
    success_msg: "Update VM startup policy passed"

##################################################################################
# Delete - check mode
##################################################################################

- name: Delete VM startup policy - check mode
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: absent
    ext_id: "{{ policy_ext_id }}"
    wait: true
  register: result
  ignore_errors: true
  check_mode: true

- name: Delete check mode - assert
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.msg is defined
    fail_msg: "Delete VM startup policy check mode failed"
    success_msg: "Delete VM startup policy check mode passed"

##################################################################################
# Delete
##################################################################################

- name: Delete VM startup policy
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: absent
    ext_id: "{{ policy_ext_id }}"
    wait: true
  register: result
  ignore_errors: true

- name: Delete - assert
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
    fail_msg: "Delete VM startup policy failed"
    success_msg: "Delete VM startup policy passed"

- name: Remove deleted policy from todelete list
  ansible.builtin.set_fact:
    todelete: "{{ todelete | difference([policy_ext_id]) }}"

##################################################################################
# Negative - Get non-existent policy
##################################################################################

- name: Get non-existent VM startup policy
  nutanix.ncp.ntnx_vm_startup_policies_info_v2:
    ext_id: "00000000-0000-0000-0000-000000000000"
  register: result
  ignore_errors: true

- name: Negative get - assert
  ansible.builtin.assert:
    that:
      - result.failed == true
    fail_msg: "Negative get test did not fail as expected"
    success_msg: "Negative get test passed as expected"

##################################################################################
# Negative - Delete non-existent policy
##################################################################################

- name: Delete non-existent VM startup policy
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: absent
    ext_id: "00000000-0000-0000-0000-000000000000"
    wait: true
  register: result
  ignore_errors: true

- name: Negative delete - assert
  ansible.builtin.assert:
    that:
      - result.failed == true
    fail_msg: "Negative delete test did not fail as expected"
    success_msg: "Negative delete test passed as expected"

##################################################################################
# Negative - Create without required name
##################################################################################

- name: Create VM startup policy without name
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: present
    description: "Missing name"
    groups:
      - categories:
          - ext_id: "{{ category_ext_id_1 }}"
    wait: true
  register: result
  ignore_errors: true

- name: Negative create without name - assert
  ansible.builtin.assert:
    that:
      - result.failed == true
    fail_msg: "Negative create without name did not fail as expected"
    success_msg: "Negative create without name passed as expected"

##################################################################################
# Cleanup remaining policies
##################################################################################

- name: Cleanup - Delete remaining policies
  nutanix.ncp.ntnx_vm_startup_policy_v2:
    state: absent
    ext_id: "{{ item }}"
    wait: true
  register: result
  ignore_errors: true
  loop: "{{ todelete }}"
  when: todelete | length > 0
